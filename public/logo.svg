      C 5,33 7,38 7,43
      L -7,43
      C -7,38 -5,33 -5,28
      C -5,22 -14,22 -20,17
      C -20,13 -14,10 -9,13
      C -11,7  -25,4  -31,-2
      C -28,-7 -18,-7 -12,-4
      C -11,-11 -21,-16 -25,-23
      C -22,-28 -15,-24 -9,-22
      C -7,-29 -13,-34 -16,-41
      C -13,-44 -7,-39 -3,-37
      C -4,-44 -1,-50 0,-58
